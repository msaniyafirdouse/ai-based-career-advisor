# ── docker-compose.yml ────────────────────────────────────────────────────────
# Place this file at the ROOT of your project (ai-career-advisor-main/)
# Run with: docker-compose up --build
#
# Architecture:
#   nginx (port 80 + 8000) → routes to backend or frontend
#   Your frontend code calls localhost:8000 → nginx forwards to backend
#   No frontend code changes needed.

version: '3.8'

services:

  # ── BACKEND ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - ./backend/memory.json:/app/memory.json
    env_file:
      - .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped
  # ── FRONTEND ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"          # Only exposed internally, not to host
    depends_on:
      - backend
    restart: unless-stopped

  # ── NGINX PROXY ────────────────────────────────────────────────────────────
  # Sits in front of everything.
  # localhost:8000 → backend  (your frontend API calls work unchanged)
  # localhost:80   → frontend (the actual website)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"         # Website: open http://localhost
      - "8000:8000" 
      - "3000:3000"    # API: your frontend calls localhost:8000 as usual
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped